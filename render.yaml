# Optional: Render Blueprint — or configure manually in Render Dashboard
services:
  - type: web
    name: clinic-saas-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-saas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

databases:
  - name: clinic-saas-db
    plan: free
    databaseName: clinic_saas
    user: clinic_saas
